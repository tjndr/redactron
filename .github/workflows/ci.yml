name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    name: "py${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff check src/

      - name: Type check (mypy)
        run: uv run --python ${{ matrix.python-version }} mypy src/

      - name: Test (pytest)
        run: uv run --python ${{ matrix.python-version }} pytest --no-cov || true
        # --no-cov: no tests yet; remove `|| true` once tests exist (M1.3+)
